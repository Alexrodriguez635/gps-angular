<div class="info-container">
  <h1>Mi Trazador de Rutas con OSRM</h1>
  
  <p>
    Distancia total: <strong>{{ distancia() }}</strong> | 
    Tiempo estimado: <strong>{{ tiempo() }}</strong>
    
    @if (cargando()) {
      <span class="spinner" style="margin-left: 10px;"></span>
      <small style="color: #3498db;"> Actualizando ruta...</small>
    }
  </p>

  <!-- El ID debe coincidir con el ViewChild -->
  <div id="mapContainer" #mapContainer></div>
</div>


<router-outlet />
